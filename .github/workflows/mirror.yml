name: Mirror Tweets to Bluesky

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt
        timeout-minutes: 2

      - name: Run mirror bot
        timeout-minutes: 14
        env:
          BSKY_APP_PASSWORD_SPORTZ: ${{ secrets.BSKY_APP_PASSWORD_SPORTZ }}
          BSKY_APP_PASSWORD_DADLER: ${{ secrets.BSKY_APP_PASSWORD_DADLER }}
          BSKY_APP_PASSWORD_TUMA: ${{ secrets.BSKY_APP_PASSWORD_TUMA }}
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
        run: python mirror.py --seed --mirror dadler

      - name: Commit and push state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/ mirrors.json
          git diff --cached --quiet || git commit -m "Update posted state with new mirrored tweets"
          git push
